name: infinite-canvas-image-builder

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  ALIYUN_REGISTRY: registry.cn-shanghai.aliyuncs.com
  ALIYUN_NAMESPACE: datamini
  IMAGE_NAME: infinite-canvas

jobs:
  build-image:
    runs-on: ubuntu-latest
    name: Build Docker Image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Docker Registry
        run: echo "${{ secrets.ALIYUN_DOCKER_REGISTRY_PASSWORD }}" | docker login --username="${{ secrets.ALIYUN_DOCKER_REGISTRY_USER }}" --password-stdin "${{ env.ALIYUN_REGISTRY }}"

      - name: Build, tag and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
